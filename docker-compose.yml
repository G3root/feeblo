services:
  pg:
    image: postgres:17-alpine
    container_name: feeblo-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feeblo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-feeblo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feeblo} -d ${POSTGRES_DB:-feeblo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    container_name: feeblo-server
    image: ghcr.io/g3root/feeblo-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        APP_RELEASE: ${APP_RELEASE:-dev}
    restart: always
    depends_on:
      pg:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-8080}
      SERVER_PORT: ${SERVER_PORT:-8080}
      APP_URL: ${APP_URL:-http://localhost:3001}
      API_URL: ${API_URL:-http://localhost:3000}
      APP_ROOT_DOMAIN: ${APP_ROOT_DOMAIN:-localhost}
      DATABASE_URL: ${DATABASE_URL:-postgres://feeblo:password@pg:5432/feeblo}
      AUTH_ENCRYPTION_KEY: ${AUTH_ENCRYPTION_KEY:-dev-key}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  web:
    container_name: feeblo-web
    image: ghcr.io/g3root/feeblo-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        APP_RELEASE: ${APP_RELEASE:-dev}
        API_URL: ${API_URL:-http://localhost:3000}
        APP_URL: ${APP_URL:-http://localhost:3001}
        APP_ROOT_DOMAIN: ${APP_ROOT_DOMAIN:-localhost}
    restart: always
    depends_on:
      - server
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${WEB_PORT:-4321}
      API_URL: ${API_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3001}
      APP_ROOT_DOMAIN: ${APP_ROOT_DOMAIN:-localhost}
    ports:
      - "${WEB_PORT:-4321}:4321"

volumes:
  postgres:

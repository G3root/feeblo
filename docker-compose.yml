services:
  server:
    container_name: feeblo-server
    image: ghcr.io/feeblo/server:${IMAGE_TAG:-nightly}
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-8080}
      SERVER_PORT: ${SERVER_PORT:-8080}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
      VITE_APP_URL: ${VITE_APP_URL}
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  web:
    container_name: feeblo-web
    image: ghcr.io/feeblo/web:${IMAGE_TAG:-nightly}
    restart: always
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${WEB_PORT:-4321}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
      VITE_API_URL: ${VITE_API_URL}
      VITE_APP_URL: ${VITE_APP_URL}
      VITE_APP_ROOT_DOMAIN: ${VITE_APP_ROOT_DOMAIN}
    ports:
      - "${WEB_PORT:-4321}:4321"
    depends_on:
      - server

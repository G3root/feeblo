name: Publish Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: publish-images-${{ github.event.workflow_run.head_sha || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: g3root

jobs:
  build-and-push:
    name: Publish ${{ matrix.service.image }}
    if: >-
      github.repository == 'G3root/feeblo' && (
        (github.event_name == 'workflow_run' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'release' &&
          startsWith(github.event.release.tag_name, 'v'))
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      attestations: write
      artifact-metadata: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: feeblo-server
            dockerfile: apps/server/Dockerfile
          - image: feeblo-web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            registry-1.docker.io:443
            auth.docker.io:443

      - name: Check out image source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract staging metadata
        if: github.event_name == 'workflow_run'
        id: staging-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          tags: |
            type=sha,format=long
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ github.event.workflow_run.head_sha }}

      - name: Extract release metadata
        if: github.event_name == 'release'
        id: release-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}

      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: APP_RELEASE=${{ github.event.release.tag_name || github.event.workflow_run.head_sha }}
          tags: |
            ${{ steps.staging-meta.outputs.tags }}
            ${{ steps.release-meta.outputs.tags }}
          labels: |
            ${{ steps.staging-meta.outputs.labels }}
            ${{ steps.release-meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.image }}

      - name: Attest image provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

name: Publish Images

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service.path }} (${{ matrix.platform.arch }})
    if: >-
      github.repository == 'G3root/feeblo' && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
      )
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - path: server
            image: feeblo-server
          - path: web
            image: feeblo-web
        platform:
          - arch: amd64
            os: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            os: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            ghcr.io:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release metadata
        id: release-meta
        if: ${{ github.event_name == 'release' }}
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          flavor: |
            suffix=-${{ matrix.platform.arch }},onlatest=true
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract workflow run metadata
        id: workflow-run-meta
        if: ${{ github.event_name == 'workflow_run' }}
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          flavor: |
            suffix=-${{ matrix.platform.arch }},onlatest=true
          tags: |
            type=sha
            type=raw,value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=nightly,enable=${{ github.event.workflow_run.head_branch == 'main' }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/${{ matrix.service.path }}/Dockerfile
          platforms: ${{ matrix.platform.os }}
          push: true
          build-args: |
            APP_RELEASE=${{ github.event.release.tag_name || github.event.workflow_run.head_sha || github.sha }}
          tags: |
            ${{ steps.release-meta.outputs.tags }}
            ${{ steps.workflow-run-meta.outputs.tags }}
          labels: |
            ${{ steps.release-meta.outputs.labels }}
            ${{ steps.workflow-run-meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.path }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.path }}-${{ matrix.platform.arch }}

  merge-manifests:
    name: Merge ${{ matrix.service.path }} Manifest
    needs: build-and-push
    if: >-
      github.repository == 'G3root/feeblo' && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - path: server
            image: feeblo-server
          - path: web
            image: feeblo-web
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            ghcr.io:443
          
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release metadata
        id: release-meta
        if: ${{ github.event_name == 'release' }}
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract workflow run metadata
        id: workflow-run-meta
        if: ${{ github.event_name == 'workflow_run' }}
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          tags: |
            type=sha
            type=raw,value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=nightly,enable=${{ github.event.workflow_run.head_branch == 'main' }}

      - name: Create multi-platform manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}
          TAGS: |
            ${{ steps.release-meta.outputs.tags }}
            ${{ steps.workflow-run-meta.outputs.tags }}
        run: |
          image_ref="$(printf '%s' "$IMAGE" | tr '[:upper:]' '[:lower:]')"

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_name="${tag#"${image_ref}":}"
            docker buildx imagetools create \
              --tag "$tag" \
              "${image_ref}:${tag_name}-amd64" \
              "${image_ref}:${tag_name}-arm64"
          done <<< "$TAGS"

name: Publish Images

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }} (${{ matrix.platform.arch }})
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [server, web]
        platform:
          - arch: amd64
            os: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            os: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release metadata
        id: release-meta
        if: ${{ github.event_name == 'release' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          flavor: |
            suffix=-${{ matrix.platform.arch }},onlatest=true
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract workflow run metadata
        id: workflow-run-meta
        if: ${{ github.event_name == 'workflow_run' }}
        uses: docker/metadata-action@v6
        with:
          context: git
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          flavor: |
            suffix=-${{ matrix.platform.arch }},onlatest=true
          tags: |
            type=sha,prefix=
            type=raw,value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=nightly,enable=${{ github.event.workflow_run.head_branch == 'main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: ${{ matrix.platform.os }}
          push: true
          tags: |
            ${{ steps.release-meta.outputs.tags }}
            ${{ steps.workflow-run-meta.outputs.tags }}
          labels: |
            ${{ steps.release-meta.outputs.labels }}
            ${{ steps.workflow-run-meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.platform.arch }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.event.workflow_run.head_sha || github.sha }}
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_APP_URL=${{ vars.VITE_APP_URL }}
            VITE_APP_ROOT_DOMAIN=${{ vars.VITE_APP_ROOT_DOMAIN }}

  merge-manifests:
    name: Merge ${{ matrix.service }} Manifest
    needs: build-and-push
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [server, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release metadata
        id: release-meta
        if: ${{ github.event_name == 'release' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract workflow run metadata
        id: workflow-run-meta
        if: ${{ github.event_name == 'workflow_run' }}
        uses: docker/metadata-action@v6
        with:
          context: git
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=nightly,enable=${{ github.event.workflow_run.head_branch == 'main' }}

      - name: Create multi-platform manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          TAGS: |
            ${{ steps.release-meta.outputs.tags }}
            ${{ steps.workflow-run-meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_name="${tag#${IMAGE}:}"
            docker buildx imagetools create \
              --tag "$tag" \
              "${IMAGE}:${tag_name}-amd64" \
              "${IMAGE}:${tag_name}-arm64"
          done <<< "$TAGS"

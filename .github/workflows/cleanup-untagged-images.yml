name: Cleanup Untagged Images

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-untagged-images.yml'
      - '.github/actions/setup-node/action.yml'
  pull_request:
    paths:
      - '.github/workflows/cleanup-untagged-images.yml'
      - '.github/actions/setup-node/action.yml'
  schedule:
    - cron: '00 10 * * 1' # Every Monday at 10:00 UTC

permissions:
  packages: write

jobs:
  cleanup:
    name: Delete untagged GHCR images
    runs-on: ubuntu-latest
    if: github.repository == 'G3root/feeblo'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          disable-telemetry: true
          allowed-endpoints: |
            api.github.com:443
            ghcr.io:443
            github.com:443

      - name: Prune old untagged images
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          packages: feeblo-server,feeblo-web
          keep-n-untagged: 20
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old commit SHA images (keep 15)
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          packages: feeblo-server,feeblo-web
          delete-tags: sha-*
          keep-n-tagged: 15
          exclude-tags: latest
          token: ${{ secrets.GITHUB_TOKEN }}

name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            nodejs.org:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false
        
      - uses: ./.github/actions/setup-node

      - name: Copy env
        run: cp .env.example .env

      - name: Build app
        run: pnpm run build
  
  docker_smoke_test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          disable-telemetry: true
          allowed-endpoints:
            api.github.com:443
            github.com:443
            nodejs.org:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            registry-1.docker.io:443
            docker.io:443
            auth.docker.io:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Copy env
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build server image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
          load: true
          tags: ghcr.io/g3root/feeblo-server:test

      - name: Build web image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          load: true
          tags: ghcr.io/g3root/feeblo-web:test

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 60
        env:
          IMAGE_TAG: test
          DATABASE_URL: postgres://feeblo:password@pg:5432/feeblo
          APP_URL: http://localhost:3001
          API_URL: http://localhost:3000
          APP_ROOT_DOMAIN: localhost
          AUTH_ENCRYPTION_KEY: dev-key

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

